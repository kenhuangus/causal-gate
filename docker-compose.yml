services:
  agentflight:
    build: .
    ports: ["8080:8080"]
    environment:
      AGENTFLIGHT_DB: /data/agentflight.db
    volumes: ["agentflight-data:/data"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 2s
      retries: 10
volumes:
  agentflight-data:

