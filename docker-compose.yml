services:
  causalgate:
    build: .
    ports: ["${CAUSALGATE_PORT:-8080}:8080"]
    environment:
      CAUSALGATE_DB: /data/causalgate.db
      CAUSALGATE_ATTESTATION_KEY: ${CAUSALGATE_ATTESTATION_KEY:?set a 32-byte assurance-suite key}
      CAUSALGATE_RUNNER_IDENTITY: local-docker-runner
      CAUSALGATE_LIVE_ANALYSIS_ENABLED: ${CAUSALGATE_LIVE_ANALYSIS_ENABLED:-true}
      CAUSALGATE_LIVE_ANALYSIS_LIMIT: ${CAUSALGATE_LIVE_ANALYSIS_LIMIT:-3}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-sol}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CAUSALGATE_GRANT_SIGNING_KEY: ${CAUSALGATE_GRANT_SIGNING_KEY:-}
    volumes: ["causalgate-data:/data"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 2s
      retries: 10
volumes:
  causalgate-data:
