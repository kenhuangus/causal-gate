substitutions: {_REGION: us-central1, _SERVICE: causal-gate, _ATTESTATION_SECRET: causalgate-attestation-key, _GRANT_SECRET: causalgate-grant-signing-key}
steps:
  - name: gcr.io/cloud-builders/docker
    args: [build, -t, '${_REGION}-docker.pkg.dev/$PROJECT_ID/causalgate/${_SERVICE}:$BUILD_ID', .]
  - name: gcr.io/cloud-builders/docker
    args: [push, '${_REGION}-docker.pkg.dev/$PROJECT_ID/causalgate/${_SERVICE}:$BUILD_ID']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args: [run, deploy, '${_SERVICE}', --image, '${_REGION}-docker.pkg.dev/$PROJECT_ID/causalgate/${_SERVICE}:$BUILD_ID', --region, '${_REGION}', --platform, managed, --allow-unauthenticated, '--service-account=causalgate-web@$PROJECT_ID.iam.gserviceaccount.com', --set-env-vars, 'CAUSALGATE_DEMO_MODE=true,CAUSALGATE_LIVE_ANALYSIS_ENABLED=true,OPENAI_MODEL=gpt-5.6-sol,CAUSALGATE_SOURCE_REVISION=$BUILD_ID,CAUSALGATE_RUNNER_IDENTITY=cloud-build-causalgate', --set-secrets, 'CAUSALGATE_ATTESTATION_KEY=${_ATTESTATION_SECRET}:latest,CAUSALGATE_GRANT_SIGNING_KEY=${_GRANT_SECRET}:latest', --port, '8080', --memory, 512Mi, --cpu, '1', --min-instances, '0', --max-instances, '1', --concurrency, '8']
images: ['${_REGION}-docker.pkg.dev/$PROJECT_ID/causalgate/${_SERVICE}:$BUILD_ID']
